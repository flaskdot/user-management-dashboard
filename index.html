
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - المستخدم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيقات إضافية خاصة بالجدول داخل لوحة التحكم */
        .dashboard-container {
            width: 80%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            text-align: center;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            direction: ltr; /* لعرض أرقام الفيزا بشكل صحيح من اليسار لليمين */
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        th { background: rgba(3, 233, 244, 0.2); color: #03e9f4; }
        .expired-label {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .card-number { font-family: monospace; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h2 style="color: #03e9f4;">مرحباً بك في لوحة التحكم</h2>
    <p>قائمة البيانات السابقة (منتهية الصلاحية)</p>
    
    <table>
        <thead>
            <tr>
                <th>نوع البطاقة</th>
                <th>رقم البطاقة</th>
                <th>تاريخ الانتهاء</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Visa Premium</td>
                <td class="card-number">4532 **** **** 1092</td>
                <td>01/24</td>
                <td><span class="expired-label">EXPIRED (منتهية)</span></td>
            </tr>
            <tr>
                <td>MasterCard</td>
                <td class="card-number">5412 **** **** 8830</td>
                <td>12/23</td>
                <td><span class="expired-label">EXPIRED (منتهية)</span></td>
            </tr>
            <tr>
                <td>Visa Gold</td>
                <td class="card-number">4000 **** **** 4411</td>
                <td>03/24</td>
                <td><span class="expired-label">EXPIRED (منتهية)</span></td>
            </tr>
        </tbody>
    </table>

    <br>
    <a href="login.html" style="color: #03e9f4; text-decoration: none; font-size: 14px;">تسجيل الخروج</a>
</div>

</body>
</html>
